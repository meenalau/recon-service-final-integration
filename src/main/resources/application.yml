spring: { application: { name: recon-service }, datasource: { url: jdbc:postgresql://host.docker.internal:5432/DeutscheBankDB, username: postgres, password: Ritwik123 }, jpa: { hibernate: { ddl-auto: update }, show-sql: true, properties: { hibernate: { format_sql: true } } }, liquibase: { enabled: false }, cache: { jcache: { config: classpath:ehcache.xml } }, kafka: { bootstrap-servers: kafka:9092, consumer: { group-id: recon-group, auto-offset-reset: earliest }, producer: { key-serializer: org.apache.kafka.common.serialization.StringSerializer, value-serializer: org.apache.kafka.common.serialization.StringSerializer } } }


# ── Actuator + Prometheus ──────────────────────────────────
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, prometheus, metrics, tracing
  endpoint:
    health:
      show-details: always
  # ── Zipkin (Spring Boot 3.x — micrometer-tracing) ─────────
  zipkin:
    tracing:
      endpoint: http://host.docker.internal:9411/api/v2/spans
      #endpoint: http://localhost:9411/api/v2/spans

  # ── Tracing sample rate ───────────────────────────────────
  tracing:
    enabled: true
    sampling:
      probability: 1.0

# ── Swagger / OpenAPI ─────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.deutschebank.recon: DEBUG   # your package
