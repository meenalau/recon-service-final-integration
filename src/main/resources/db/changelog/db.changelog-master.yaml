databaseChangeLog:

  - changeSet:
      id: 1
      author: meenal

      changes:
        - addColumn:
            tableName: recon_breaks
            columns:
              - column:
                  name: resolved_by
                  type: varchar(100)

  - changeSet:
      id: 3
      author: meenal

      changes:
        - createTable:
            tableName: audit_log

            columns:
              - column:
                  name: audit_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: entity_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: entity_name
                  type: VARCHAR(50)

              - column:
                  name: action_type
                  type: VARCHAR(20)

              - column:
                  name: created_at
                  type: TIMESTAMP
  - changeSet:
      id: 4
      author: meenal

      changes:
        - renameColumn:
            tableName: settlements
            oldColumnName: settled_amount
            newColumnName: their_amount
            columnDataType: numeric(20,2)