networks:
  recon-network:
    driver: bridge

services:

  # ── 1. PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    networks:
      - recon-network
    environment:
      POSTGRES_DB: DeutscheBankDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ritwik123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d DeutscheBankDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Kafka (KRaft – no ZooKeeper) ─────────────────────────────────────
  kafka:
    image: apache/kafka:3.8.1
    container_name: kafka
    networks:
      - recon-network
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ── 3. Kafdrop (Kafka UI) ────────────────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    networks:
      - recon-network
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: "-Xms32M -Xmx64M"
    ports:
      - "9000:9000"
    restart: on-failure

  # ── 4. Zipkin ────────────────────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    networks:
      - recon-network
    ports:
      - "9411:9411"

  # ── 5. recon-service (Spring Boot) ───────────────────────────────────────
  recon-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recon-service
    networks:
      - recon-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/DeutscheBankDB
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_LIQUIBASE_ENABLED: "false"
    ports:
      - "8080:8080"
    restart: on-failure

  # ── 6. recon-ui (React + Vite) ───────────────────────────────────────────
  recon-ui:
    build:
      context: ./recon-ui
      dockerfile: Dockerfile
    container_name: recon-ui
    networks:
      - recon-network
    depends_on:
      - recon-service
    ports:
      - "3000:80"
    restart: on-failure

  # ── 7. Prometheus ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - recon-network
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - recon-service

  # ── 8. Grafana ───────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - recon-network
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  kafka_data: